name: Security Scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ruff-security:
    name: Code Security (ruff --select S)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          version: "0.9.4"

      - name: Run ruff security rules (bandit equivalent)
        run: |
          uvx ruff check \
            --select S \
            --exclude tests/,docs/ \
            .
        # S = flake8-bandit rules: hardcoded passwords, shell injection,
        # use of assert in production code, insecure hash functions, etc.
        # Falla si hay cualquier hallazgo de nivel ERROR.

  trivy-scan:
    name: Vulnerability Scan (Trivy)
    runs-on: ubuntu-latest
    permissions:
      security-events: write # para publicar resultados en GitHub Security tab
      contents: read

    steps:
      - uses: actions/checkout@v5

      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: "fs"
          scan-ref: "."
          format: "sarif"
          output: "trivy-results.sarif"
          severity: "CRITICAL,HIGH"
          exit-code: "1"

      - name: Upload Trivy SARIF to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: "trivy-results.sarif"
          category: "trivy"
