name: Build & Push Docker Images

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}/fraud-detection-system

jobs:
  build-and-push:
    name: Build & Push — ${{ matrix.name }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: serving
            dockerfile: docker/serving/Dockerfile
            image: fraud-detection-serving
          - name: features
            dockerfile: docker/streaming/Dockerfile
            image: fraud-detection-features
            build_args: "SERVICE_GROUP=features\nSERVICE_CMD=streaming.features.main"
          - name: inference
            dockerfile: docker/streaming/Dockerfile
            image: fraud-detection-inference
            build_args: "SERVICE_GROUP=inference\nSERVICE_CMD=streaming.inference.main"
          - name: producer
            dockerfile: docker/streaming/Dockerfile
            image: fraud-detection-producer
            build_args: "SERVICE_GROUP=producer\nSERVICE_CMD=streaming.producer.main"
          - name: airflow
            dockerfile: docker/airflow/Dockerfile
            image: fraud-detection-airflow
          - name: mlflow
            dockerfile: docker/mlflow/Dockerfile
            image: fraud-detection-mlflow
          - name: grafana
            dockerfile: docker/grafana/Dockerfile
            image: fraud-detection-grafana

    steps:
      - uses: actions/checkout@v5

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.IMAGE_PREFIX }}/${{ matrix.image }}
          tags: |
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push ${{ matrix.name }}
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: ${{ matrix.build_args }}
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}
