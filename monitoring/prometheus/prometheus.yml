global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "serving"
    static_configs:
      - targets: ["serving:8000"]
    metrics_path: /metrics
    scrape_interval: 10s

  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: "postgresql"
    static_configs:
      - targets: ["postgres-exporter:9187"]
    scrape_interval: 30s

  - job_name: "timescaledb"
    static_configs:
      - targets: ["timescaledb-exporter:9187"]
    scrape_interval: 30s

  - job_name: "kafka"
    static_configs:
      - targets: ["kafka-exporter:9308"]
    scrape_interval: 30s
