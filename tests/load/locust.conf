# Configuración por defecto para runs headless.
# Los valores se pueden sobreescribir con flags CLI.
# Requiere FASTAPI_WORKERS>=2 y modelo pre-cargado en MLflow Production
# para que el threshold P99 < 100ms sea alcanzable.
headless = false
users = 500
spawn-rate = 50
run-time = 120s
host = http://localhost:8000
html = tests/load/report.html
loglevel = WARNING
